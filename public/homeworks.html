<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="robots" content="noindex"/>
    <meta property="og:title" content="2B Cordeliers"/>
    <meta property="og:type" content="website"/>
    <meta property="og:url" content="https://2bcordeliers.github.io/"/>
    <meta property="og:image" content="https://2bcordeliers.github.io/media/presentation-card.png"/>
    <link rel="stylesheet" href="css/style.css"/>
    <link rel="icon" href="data:,"/>
    <title>2B Cordeliers</title>
</head>
<body>
<main>
    <h1>Devoirs à faire</h1>
</main>
<script src="js/data.js"></script>
<script>
    Map.groupBy(homeworks, homework => homework[0].split("-")[0]).forEach((dailyHomeworks, date) => {
        let dateHeading = document.createElement("h2");
        dateHeading.innerText = displayDate(new Date(dates.get(date)));
        document.querySelector("main").appendChild(dateHeading);
        let homeworkList = document.createElement("ul");
        document.querySelector("main").appendChild(homeworkList);
        dailyHomeworks.forEach(([id, homework]) => {
            let listItem = document.createElement("li");
            let link = document.createElement("a");
            link.href = "homework-details.html?id=" + id;
            link.innerText = `${subjects.get(id.split("-")[1])} - ${homework}`;
            homeworkList.appendChild(listItem);
            listItem.appendChild(link);
        })
    })
</script>
</body>
</html>
