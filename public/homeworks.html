    <title>2B Cordeliers</title>

<body>
<main>
    <h1>Devoirs à faire</h1>
</main>
<script src="js/data.js"></script>
<script>
    homeworks.forEach(([date, dailyHomeworks]) => {
        let dateHeading = document.createElement("h2");
        dateHeading.innerText = displayDate(date);
        document.querySelector("main").appendChild(dateHeading);
        let homeworkList = document.createElement("ul");
        document.querySelector("main").appendChild(homeworkList);
        dailyHomeworks.forEach(homework => {
            let listItem = document.createElement("li");
            listItem.innerText = homework[2];
            homeworkList.appendChild(listItem);
        })
    })
</script>
</body>
</html>
